framework:
    asset_mapper:
        # The paths to make available to the asset mapper.
        paths:
            - assets/
        excluded_patterns:
            - '*/assets/styles/_*.scss'
            - '*/assets/styles/**/_*.scss'
            - '**/sb-admin-2.scss'
        missing_import_mode: strict

sensiolabs_typescript:
    source_dir: ['%kernel.project_dir%/assets/ts']

when@prod:
    framework:
        asset_mapper:
            missing_import_mode: warn
